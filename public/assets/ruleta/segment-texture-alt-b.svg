<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Subtle warm cream wedge texture with dot pattern">
  <defs>
    <clipPath id="wedgeClipB">
      <path d="M0 128 L0 0 A128 128 0 0 1 128 128 Z"/>
    </clipPath>
    <pattern id="softDots" patternUnits="userSpaceOnUse" width="18" height="18">
      <circle cx="5" cy="5" r="1.6" fill="#6F4E37" opacity="0.075"/>
      <circle cx="14" cy="14" r="1.1" fill="#D4A853" opacity="0.08"/>
    </pattern>
    <filter id="softShadowB" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#6F4E37" flood-opacity="0.07"/>
    </filter>
  </defs>
  <g clip-path="url(#wedgeClipB)">
    <path d="M0 128 L0 0 A128 128 0 0 1 128 128 Z" fill="#EDE4D6" filter="url(#softShadowB)"/>
    <rect x="0" y="0" width="128" height="128" fill="url(#softDots)"/>
    <path d="M0 128 L0 0 A128 128 0 0 1 128 128" fill="none" stroke="#6F4E37" stroke-width="2" stroke-linejoin="round" opacity="0.10"/>
    <path d="M12 116 A106 106 0 0 1 116 116" fill="none" stroke="#D4A853" stroke-width="2" stroke-linecap="round" opacity="0.10"/>
  </g>
</svg>
