    <circle cx="423" cy="34" r="4" fill="#F5F0E8" stroke="#6F4E37" stroke-width="1.8"/>
    <circle cx="511" cy="36" r="5" fill="#4A9B6E"/>
    <circle cx="555" cy="120" r="4" fill="#D4A853"/>
