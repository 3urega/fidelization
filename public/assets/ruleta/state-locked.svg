    <path d="M120 128C124.4 128 128 131.6 128 136C128 139 126.3 141.6 124 143V149C124 151.2 122.2 153 120 153C117.8 153 116 151.2 116 149V143C113.7 141.6 112 139 112 136C112 131.6 115.6 128 120 128Z" fill="#6F4E37"/>
    <path d="M98 122C106 115 134 114 144 123" stroke="#F5F0E8" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
