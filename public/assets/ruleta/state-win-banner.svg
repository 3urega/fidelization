    <path d="M304 113C309 118 315 118 320 113" stroke="#6F4E37" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M289 130C297 136 306 136 314 130" stroke="#6F4E37" stroke-width="2.6" stroke-linecap="round"/>
