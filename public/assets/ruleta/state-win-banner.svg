  <g stroke-linecap="round" stroke-width="2.5">
    <path d="M194 123L179 136" stroke="#4A9B6E"/>
    <path d="M406 122L421 136" stroke="#4A9B6E"/>
    <path d="M170 113L156 113" stroke="#D4A853"/>
