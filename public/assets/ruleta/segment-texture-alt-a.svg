<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Subtle cream wedge texture with diagonal lines">
  <defs>
    <clipPath id="wedgeClipA">
      <path d="M0 128 L0 0 A128 128 0 0 1 128 128 Z"/>
    </clipPath>
    <pattern id="diagonalLines" patternUnits="userSpaceOnUse" width="16" height="16" patternTransform="rotate(45)">
      <path d="M0 8 H16" stroke="#6F4E37" stroke-width="1.8" stroke-linecap="round" opacity="0.08"/>
    </pattern>
    <filter id="softShadowA" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#6F4E37" flood-opacity="0.08"/>
    </filter>
  </defs>
  <g clip-path="url(#wedgeClipA)">
    <path d="M0 128 L0 0 A128 128 0 0 1 128 128 Z" fill="#F5F0E8" filter="url(#softShadowA)"/>
    <rect x="0" y="0" width="128" height="128" fill="url(#diagonalLines)"/>
    <path d="M0 128 L0 0 A128 128 0 0 1 128 128" fill="none" stroke="#6F4E37" stroke-width="2" stroke-linejoin="round" opacity="0.10"/>
    <path d="M10 118 A108 108 0 0 1 118 118" fill="none" stroke="#D4A853" stroke-width="2" stroke-linecap="round" opacity="0.12"/>
  </g>
</svg>
