<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-label="Discount promotion icon" shape-rendering="geometricPrecision">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#3D2B1F" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="greenRibbon" x1="24" y1="18" x2="78" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5EAE82"/>
      <stop offset="1" stop-color="#4A9B6E"/>
    </linearGradient>
    <linearGradient id="cornerGold" x1="62" y1="18" x2="78" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E0BC67"/>
      <stop offset="1" stop-color="#D4A853"/>
    </linearGradient>
  </defs>

  <g filter="url(#softShadow)">
    <!-- main ticket/tag body -->
    <path d="M18 28c0-5.5 4.5-10 10-10h37.2c2.7 0 5.2 1.1 7.1 2.9l6.8 6.8c1.8 1.9 2.9 4.4 2.9 7.1V68c0 5.5-4.5 10-10 10H28c-5.5 0-10-4.5-10-10v-6.2c5.1-.9 9-5.3 9-10.8s-3.9-9.9-9-10.8V28Z" fill="#F5F0E8" stroke="#6F4E37" stroke-width="2" stroke-linejoin="round"/>

    <!-- perforation/café ticket notch hint -->
    <path d="M18 40.2c5.1.9 9 5.3 9 10.8s-3.9 9.9-9 10.8" fill="none" stroke="#6F4E37" stroke-width="2" stroke-linecap="round"/>

    <!-- folded corner -->
    <path d="M64 18v13c0 2.2 1.8 4 4 4h14" fill="url(#cornerGold)" stroke="#6F4E37" stroke-width="2" stroke-linejoin="round"/>
    <path d="M65 19 81 35" fill="none" stroke="#6F4E37" stroke-width="2" stroke-linecap="round" opacity="0.72"/>

    <!-- green promotional ribbon -->
    <path d="M25 25h30c3.9 0 7 3.1 7 7v4H25c-2.2 0-4-1.8-4-4v-3c0-2.2 1.8-4 4-4Z" fill="url(#greenRibbon)" stroke="#6F4E37" stroke-width="2" stroke-linejoin="round"/>
    <path d="M56 25h9l-3 11h-6Z" fill="#3F835F" opacity="0.35"/>

    <!-- percent symbol -->
    <circle cx="39" cy="49" r="4.8" fill="none" stroke="#6F4E37" stroke-width="2"/>
    <circle cx="58" cy="65" r="4.8" fill="none" stroke="#6F4E37" stroke-width="2"/>
    <path d="M60.8 44.5 36.5 69" fill="none" stroke="#6F4E37" stroke-width="3" stroke-linecap="round"/>

    <!-- small gold accent dots -->
    <circle cx="72" cy="54" r="3" fill="#D4A853" stroke="#6F4E37" stroke-width="1.5"/>
    <circle cx="34" cy="32" r="2" fill="#F5F0E8" opacity="0.78"/>
  </g>
</svg>
