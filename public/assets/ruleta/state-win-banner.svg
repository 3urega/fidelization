    <ellipse cx="293.5" cy="82" rx="55" ry="17" fill="#F5F0E8" stroke="#6F4E37" stroke-width="3"/>
    <ellipse cx="293.5" cy="82" rx="39" ry="9" fill="#6F4E37" opacity="0.92"/>
